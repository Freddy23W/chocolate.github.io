<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queer Art for Care Festival</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            position: relative;
            z-index: 10;
        }

        .hero-title {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255,255,255,0.3);
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 30px rgba(255,255,255,0.3); }
            to { text-shadow: 0 0 40px rgba(255,255,255,0.5), 0 0 50px rgba(255,255,255,0.3); }
        }

        .subtitle {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 300;
            margin-bottom: 3rem;
            opacity: 0.9;
            line-height: 1.4;
        }

        .audio-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            margin: 2rem 0;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .audio-title {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: #fff;
        }

        audio {
            width: 100%;
            max-width: 400px;
            height: 50px;
            border-radius: 25px;
            outline: none;
        }

        audio::-webkit-media-controls-panel {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 25px;
        }

        .floating-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 20s infinite ease-in-out;
        }

        .shape:nth-child(1) {
            width: 80px;
            height: 80px;
            left: 10%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 120px;
            height: 120px;
            right: 20%;
            animation-delay: 2s;
        }

        .shape:nth-child(3) {
            width: 60px;
            height: 60px;
            left: 70%;
            animation-delay: 4s;
        }

        .shape:nth-child(4) {
            width: 100px;
            height: 100px;
            left: 40%;
            animation-delay: 6s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.7;
            }
            25% {
                transform: translateY(-20px) rotate(90deg);
                opacity: 0.9;
            }
            50% {
                transform: translateY(0) rotate(180deg);
                opacity: 0.7;
            }
            75% {
                transform: translateY(20px) rotate(270deg);
                opacity: 0.9;
            }
        }

        .play-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.5);
                opacity: 0.5;
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 1rem;
            }
            
            .audio-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="floating-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="container">
        <h1 class="hero-title">Queer Art for Care</h1>
        <p class="subtitle">A Festival Celebrating Art, Community & Love</p>
        
        <div class="audio-container">
            <h2 class="audio-title">🎧 Listen to Our Story</h2>
            <audio id="audioPlayer" controls autoplay>
                <source src="Chocolate - The Podast Ep.1 (Unsweetend Chocolate) .mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
            <div class="play-indicator">
                <div class="pulse"></div>
                <span>Now playing</span>
            </div>
        </div>
    </div>

    <script>
        // Try to autoplay the audio
        const audio = document.getElementById('audioPlayer');
        
        // Modern browsers require user interaction for autoplay
        // We'll attempt to play and handle any restrictions
        function attemptAutoplay() {
            audio.play().then(() => {
                console.log('Audio autoplay started successfully');
            }).catch(error => {
                console.log('Autoplay was prevented:', error);
                // Show a user-friendly message if autoplay is blocked
                const indicator = document.querySelector('.play-indicator span');
                indicator.textContent = 'Tap to play';
                
                // Add click listener to start playback on user interaction
                document.addEventListener('click', function playOnce() {
                    audio.play();
                    indicator.textContent = 'Now playing';
                    document.removeEventListener('click', playOnce);
                }, { once: true });
            });
        }

        // Attempt autoplay when page loads
        window.addEventListener('load', attemptAutoplay);

        // Also try on visibility change (in case tab becomes active)
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && audio.paused) {
                attemptAutoplay();
            }
        });
    </script>
</body>
</html>
