name: Initialize Project

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: Project name (used in README and docs)
        required: true
        type: string
      init_tasks:
        description: Initialize orga task structure (TASKS.md + T-001)
        required: true
        default: true
        type: boolean
      purge_legacy_tasks:
        description: Remove any pre-existing task history under orga/tasks/active and orga/tasks/archive
        required: true
        default: true
        type: boolean
      purge_docs:
        description: Remove docs/* except docs/windsurf
        required: true
        default: true
        type: boolean
      force:
        description: Allow re-running even if repo appears already initialized
        required: true
        default: false
        type: boolean
      auto_merge:
        description: Enable GitHub auto-merge for the created PR (requires repo setting "Allow auto-merge" and branch protection).
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  init:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Initialize repository files
        env:
          PROJECT_NAME: ${{ inputs.project_name }}
          INIT_TASKS: ${{ inputs.init_tasks }}
          PURGE_LEGACY_TASKS: ${{ inputs.purge_legacy_tasks }}
          PURGE_DOCS: ${{ inputs.purge_docs }}
          FORCE: ${{ inputs.force }}
        run: python .github/scripts/init_project.py

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PR_TOKEN || github.token }}
          branch: chore/init-project
          delete-branch: true
          title: "Initialize project: ${{ inputs.project_name }}"
          commit-message: "Initialize project: ${{ inputs.project_name }}"
          body: |
            This PR was generated by the **Initialize Project** workflow.

            What it does:
            - Updates/creates baseline project docs (README + orga skeleton)
            - Syncs `docs/windsurf/*` -> `.windsurf/*`
            - Optionally resets `orga/tasks/*` and/or `docs/*` based on workflow inputs

            Follow-ups:
            - Review the created/updated files and adjust naming/conventions for your project.
            - If you use this template across repos: keep `docs/windsurf/` as the copy-pack and follow `docs/windsurf/SYNC.md`.

      - name: Enable Pull Request Auto-merge
        if: ${{ inputs.auto_merge && steps.cpr.outputs.pull-request-operation == 'created' }}
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GH_PR_TOKEN || github.token }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
