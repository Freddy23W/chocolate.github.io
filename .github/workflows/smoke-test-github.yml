name: Smoke Test - GitHub Permissions

on:
  workflow_dispatch:
    inputs:
      auto_merge:
        description: Enable GitHub auto-merge for the created PR (requires repo setting "Allow auto-merge" and branch protection).
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create smoke test change
        run: |
          mkdir -p .github/smoke
          echo "smoke test run_id=${{ github.run_id }}" > .github/smoke/${{ github.run_id }}.txt

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PR_TOKEN || github.token }}
          branch: chore/smoke-gh-permissions
          delete-branch: true
          title: "Smoke test: GitHub Actions permissions"
          commit-message: "Smoke test: GitHub Actions permissions"
          body: |
            This PR was generated by the **Smoke Test - GitHub Permissions** workflow.

            If you can see this PR and it contains a new file under `.github/smoke/`, then:

            - GitHub Actions are enabled
            - `GITHUB_TOKEN` has `contents: write`
            - `GITHUB_TOKEN` has `pull-requests: write`

            You can merge or close this PR.

      - name: Enable Pull Request Auto-merge
        if: ${{ inputs.auto_merge && steps.cpr.outputs.pull-request-operation == 'created' }}
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GH_PR_TOKEN || github.token }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
