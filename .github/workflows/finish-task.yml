name: Finish Task

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: Task ID (e.g. T-002)
        required: true
        type: string
      force:
        description: Allow proceeding even if TASKS.md row is missing (will still try to archive folder)
        required: true
        default: false
        type: boolean
      auto_merge:
        description: Enable GitHub auto-merge for the created PR (requires repo setting "Allow auto-merge" and branch protection).
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  finish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Archive task folder and update TASKS.md
        id: fin
        env:
          TASK_ID: ${{ inputs.task_id }}
          FORCE: ${{ inputs.force }}
        run: python .github/scripts/finish_task.py

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PR_TOKEN || github.token }}
          branch: ${{ steps.fin.outputs.branch }}
          delete-branch: true
          title: ${{ steps.fin.outputs.pr_title }}
          commit-message: ${{ steps.fin.outputs.commit_message }}
          body: |
            This PR was generated by the **Finish Task** workflow.

            - Task: `${{ inputs.task_id }}`
            - Archived folder: `${{ steps.fin.outputs.archived_folder }}`

            Next:
            - Merge this PR.
            - If you maintain long-term history, keep the task notes under `orga/tasks/archive/`.

      - name: Enable Pull Request Auto-merge
        if: ${{ inputs.auto_merge && steps.cpr.outputs.pull-request-operation == 'created' }}
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GH_PR_TOKEN || github.token }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
