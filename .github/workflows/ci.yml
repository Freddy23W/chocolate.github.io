name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test runner
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Install dependencies (if present)
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Run tests
        shell: bash
        run: |
          set +e
          python -m pytest -q
          code=$?
          if [ "$code" -eq 5 ]; then
            echo "No tests collected; passing CI (placeholder mode)."
            exit 0
          fi
          exit "$code"
