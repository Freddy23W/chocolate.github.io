name: Start Task

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: Task ID (e.g. T-002)
        required: true
        type: string
      title:
        description: Task title
        required: true
        type: string
      slug:
        description: Optional slug (lowercase letters/numbers/hyphens). If omitted, derived from title.
        required: false
        type: string
      date:
        description: Optional date (YYYY-MM-DD). If omitted, uses today's date (UTC).
        required: false
        type: string
      force:
        description: Allow creating even if TASKS.md already contains this task_id
        required: true
        default: false
        type: boolean
      auto_merge:
        description: Enable GitHub auto-merge for the created PR (requires repo setting "Allow auto-merge" and branch protection).
        required: true
        default: false
        type: boolean

      delete_branch:
        description: Delete the task branch after the PR is merged.
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  start:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare task branch and files
        id: prep
        env:
          TASK_ID: ${{ inputs.task_id }}
          TASK_TITLE: ${{ inputs.title }}
          TASK_SLUG: ${{ inputs.slug }}
          TASK_DATE: ${{ inputs.date }}
          FORCE: ${{ inputs.force }}
        run: python .github/scripts/start_task.py

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PR_TOKEN || github.token }}
          branch: ${{ steps.prep.outputs.branch }}
          delete-branch: ${{ inputs.delete_branch }}
          title: ${{ steps.prep.outputs.pr_title }}
          commit-message: ${{ steps.prep.outputs.commit_message }}
          body: |
            This PR was generated by the **Start Task** workflow.

            - Task: `${{ inputs.task_id }}`
            - Title: `${{ inputs.title }}`
            - Folder: `${{ steps.prep.outputs.task_folder }}`

            Next:
            - Review/adjust `brief.md`, `README.md`, `plan.md`, and `outcome.md` in the task folder.
              - If you use `/project-planner`, its canonical handoff brief lives at `orga/domain/task-briefs/T-XXX.md` and is copied into the task folder as `brief.md`.
            - In Windsurf, run `/plan-task` to turn this into a concrete execution plan.
            - During execution, keep durable results and validation notes in `outcome.md`.

      - name: Enable Pull Request Auto-merge
        if: ${{ inputs.auto_merge && steps.cpr.outputs.pull-request-operation == 'created' }}
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GH_PR_TOKEN || github.token }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
